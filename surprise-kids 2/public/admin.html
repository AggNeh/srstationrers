<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · SR Stationers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E">
</head>
<body style="background:var(--cream)">
  <!-- login gate -->
  <div id="login" class="login-card">
    <h3>🔐 Admin sign-in</h3>
    <p class="muted" style="font-size:.9rem">Use the ADMIN_USER / ADMIN_PASS credentials configured on the server.</p>
    <div class="field"><label>Username</label><input id="user" autocomplete="username" placeholder="Username"></div>
    <div class="field"><label>Password</label><input type="password" id="pass" autocomplete="current-password" placeholder="Password"></div>
    <button class="btn btn-primary btn-block" id="login-btn">Sign in</button>
  </div>

  <!-- dashboard -->
  <div class="admin-shell hidden" id="shell">
    <aside class="admin-side">
      <div class="brand-name">SR Stationers</div>
      <nav class="admin-nav">
        <button data-tab="dash" class="active">📊 Dashboard</button>
        <button data-tab="products">📦 Products</button>
        <button data-tab="categories">🏷️ Categories</button>
        <button data-tab="orders">🧾 Orders</button>
        <button data-tab="access">🔑 Access code</button>
        <button onclick="location.href='/'">🏠 View store</button>
        <button id="logout">🚪 Sign out</button>
      </nav>
    </aside>
    <main class="admin-main" id="view"></main>
  </div>

  <div id="modal-root"></div>

  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
