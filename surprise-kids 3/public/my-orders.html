<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Orders · SR Stationers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="container" id="main">
    <section class="section">
      <div class="section-head">
        <div>
          <div class="kicker">Account-free order tracking</div>
          <h2>My orders</h2>
        </div>
      </div>

      <p class="muted">Orders you've placed from this device appear below. If you've switched devices, look up your past orders with your phone number.</p>

      <!-- Local (this-device) orders -->
      <div id="local-orders"></div>

      <!-- Phone lookup -->
      <div class="card" style="padding:20px;margin-top:24px;max-width:520px">
        <h3 style="margin-top:0">Look up by phone number</h3>
        <p class="muted" style="font-size:.9rem;margin-top:-4px">Enter the phone number you used when placing the order.</p>
        <div style="display:flex;gap:8px">
          <input id="lookup-phone" type="tel" placeholder="e.g. 9876543210" style="flex:1">
          <button class="btn btn-primary" id="lookup-btn">Find orders</button>
        </div>
        <div id="lookup-results" style="margin-top:16px"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/app.js"></script>
  <script src="/js/my-orders.js"></script>
</body>
</html>
