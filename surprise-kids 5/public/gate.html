<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access · SR Stationers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E">
</head>
<body class="gate-body">
  <main class="gate-wrap">
    <div class="gate-card">
      <div class="gate-mark">🔒</div>
      <h1 id="gate-title">Private catalog</h1>
      <p class="muted" id="gate-sub">Enter the access code shared by SR Stationers to view the catalog.</p>
      <form id="gate-form">
        <input
          id="gate-code"
          name="code"
          type="text"
          autocomplete="off"
          autocapitalize="characters"
          inputmode="text"
          placeholder="Access code"
          required>
        <button class="btn btn-primary btn-block" type="submit" id="gate-submit">Unlock</button>
      </form>
      <div id="gate-status" class="gate-status"></div>
      <p class="muted gate-foot">If you don't have a code, please WhatsApp us — see contact below.</p>
      <div class="gate-contact" id="gate-contact"></div>
    </div>
  </main>
  <script src="/js/gate.js"></script>
</body>
</html>
