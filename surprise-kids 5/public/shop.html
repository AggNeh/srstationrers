<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop · SR Stationers</title>
  <meta name="description" content="Browse the SR Stationers catalog by category, sort by price or name, and order via WhatsApp.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%81%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="container" id="main">
    <section class="section" id="catalog">
      <div class="section-head">
        <div>
          <div class="kicker" id="list-kicker">Catalog</div>
          <h2 id="list-title">All products</h2>
        </div>
        <div class="toolbar">
          <select id="sort">
            <option value="newest">Newest first</option>
            <option value="price_asc">Price: low to high</option>
            <option value="price_desc">Price: high to low</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>
      <div class="product-grid" id="grid">
        <!-- skeletons injected -->
      </div>
      <div class="center" style="margin-top:28px">
        <button class="btn btn-dark hidden" id="load-more">Load more</button>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/app.js"></script>
  <script src="/js/shop.js"></script>
</body>
</html>
